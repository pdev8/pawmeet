<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pawk Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
  </head>
  <body>
    <!-- Login gate -->
    <main id="login" class="login" hidden>
      <form id="login-form" class="login-card">
        <div class="brand"><span class="paw">🐾</span> Pawk <span class="brand-admin">Admin</span></div>
        <p class="login-sub">Sign in with a Pawk account to view the console.</p>
        <label>Email<input type="email" id="email" autocomplete="username" required /></label>
        <label>Password<input type="password" id="password" autocomplete="current-password" required /></label>
        <button type="submit" id="login-btn">Sign in</button>
        <p id="login-error" class="error" role="alert" hidden></p>
      </form>
    </main>

    <!-- Console -->
    <div id="console" class="console" hidden>
      <aside class="sidebar">
        <div class="brand"><span class="paw">🐾</span> Pawk <span class="brand-admin">Admin</span></div>
        <nav id="nav">
          <button class="nav-item" data-panel="operations">Operations</button>
          <button class="nav-item" data-panel="moderation" data-admin-only hidden>Moderation</button>
          <button class="nav-item" data-panel="events">Events</button>
          <button class="nav-item" data-panel="users">Users</button>
        </nav>
        <div class="sidebar-foot">
          <span id="who" class="who"></span>
          <button id="signout" class="link">Sign out</button>
        </div>
      </aside>

      <section class="content">
        <div class="role-note">
          v1 — authenticates as any Pawk user and reads what row-level security
          allows. A dedicated admin role + write access lands with the moderation epic.
        </div>
        <div id="panel"></div>
      </section>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
