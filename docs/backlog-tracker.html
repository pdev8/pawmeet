  { n: 5, title: "Post / Host an Event", flags: ["indep"], tasks: [

  { n: 8, title: "Notifications & Push", flags: ["blocks"], tasks: [

  { n: 9, title: "Onboarding", flags: ["indep"], tasks: [

    { t: "Optional: create a saved search from breed + area" },
  ]},
  { n: 10, title: "Profiles & Badges", flags: ["indep"], tasks: [
    { t: "Pet profile screen (photo, breed, size, temperament tags)", done: true },
    { t: "Achievement badges — 8 badges as interactive 3D dog collars (expo-gl + three)", done: true },
    { t: "Tap attendee badge → mini profile", done: true },
  ]},
  { n: 11, title: "Trust, Safety & Moderation", flags: ["indep"], note: "launch-critical for a UGC app", tasks: [
    { t: "Report event / user / comment", b: true, done: true },
    { t: "Block user (mutual hide of events, RSVPs, comments)", b: true, done: true },
    { t: "Admin moderation-queue web view + a review process/owner (admins table + Moderation panel)", done: true },

  { n: 12, title: "Design System & Accessibility", flags: ["indep"], tasks: [

  { n: 15, title: "Release & Launch", flags: ["blocks"], note: "ship & operate it, not build it", groups: [

    { label: "15c · Production ops & security", tasks: [
      { t: "Separate prod environment + secrets management" },
      { t: "Row-level security policies (Supabase RLS)" },
      { t: "DB backups + migration strategy" },
      { t: "API-layer rate limiting / abuse protection" },
      { t: "Security review pass (UGC + location data)" },
    ]},
    { label: "15d · Observability", tasks: [
      { t: "Crash + error reporting (Sentry)" },
      { t: "Product analytics + KPIs" },
      { t: "Uptime / error alerting + logging" },
    ]},
    { label: "15e · Launch readiness (non-code)", tasks: [
      { t: "Cold-start content plan: seed launch events or pick a beachhead city" },

    ]},

const TAG_META = {
  indep:  { cls: "indep",  label: "🟢 independent" },
  blocks: { cls: "blocks", label: "🔴 unblocks others" },
  next:   { cls: "next",   label: "⭐ suggested next" },
};

const CHECK_KEY = "pawk-backlog-checks-v2";
const UI_KEY = "pawk-backlog-ui-v2";

const load = (k, d) => { try { return Object.assign(d, JSON.parse(localStorage.getItem(k)) || {}); } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let checks = load(CHECK_KEY, {});
let ui = load(UI_KEY, { filter: "all", hideDone: false, collapsed: {} });

// Build task registry with stable ids + metadata.
const TASKS = []; // {id, epicN, text, blocker, isNext}
DATA.forEach(ep => {
  const isNext = (ep.flags || []).includes("next");
  let idx = 0;
  const addTask = (t) => {
    const id = "e" + ep.n + "-" + (idx++);
    TASKS.push({ id, epicN: ep.n, text: t.t, blocker: !!t.b, isNext, done: !!t.done });
    // Seed completed items so the tracker opens reflecting real progress; a
    // user toggle (stored under id) always wins over this default.
    if (t.done && !(id in checks)) checks[id] = true;
    t.__id = id;
  };
  if (ep.groups) ep.groups.forEach(g => g.tasks.forEach(addTask));
  else ep.tasks.forEach(addTask);
});

const list = document.getElementById("list");

function taskEl(t) {
  const wrap = document.createElement("div");
  wrap.className = "task";
  wrap.dataset.id = t.id;
  wrap.dataset.blocker = t.blocker ? "1" : "0";
  wrap.dataset.next = t.isNext ? "1" : "0";

  const label = document.createElement("label");
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.className = "cb";
  cb.checked = !!checks[t.id];
  cb.addEventListener("change", () => toggle(t.id, cb.checked, wrap));

  const span = document.createElement("span");
  span.className = "task-text";
  span.textContent = t.text;
  if (t.blocker) {
    const f = document.createElement("span");
    f.className = "blocker-flag";
    f.textContent = "🚫 blocker";
    span.appendChild(f);
  }
  label.appendChild(cb);
  label.appendChild(span);
  wrap.appendChild(label);
  if (cb.checked) wrap.classList.add("done");
  return wrap;
}

function render() {
  const frag = document.createDocumentFragment();
  DATA.forEach(ep => {
    const epic = document.createElement("section");
    epic.className = "epic";
    epic.dataset.n = ep.n;
    if (ui.collapsed[ep.n]) epic.classList.add("collapsed");

    // head
    const head = document.createElement("div");
    head.className = "epic-head";
    head.setAttribute("role", "button");
    head.setAttribute("tabindex", "0");
    head.innerHTML =
      '<svg class="chev" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '<span class="epic-num">' + (ep.n < 10 ? "0" + ep.n : ep.n) + '</span>' +
      '<span class="epic-title rounded"></span>' +
      '<span class="epic-meta"><span class="mini"></span><span class="ring"><span></span></span></span>';
    head.querySelector(".epic-title").textContent = ep.title;
    const toggleCollapse = () => {
      epic.classList.toggle("collapsed");
      ui.collapsed[ep.n] = epic.classList.contains("collapsed");
      save(UI_KEY, ui);
    };
    head.addEventListener("click", toggleCollapse);
    head.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleCollapse(); } });
    epic.appendChild(head);

    // body
    const body = document.createElement("div");
    body.className = "epic-body";

    const tags = (ep.flags || []).map(f => TAG_META[f]).filter(Boolean);
    if (tags.length || ep.note) {
      const tr = document.createElement("div");
      tr.className = "tag-row";
      tags.forEach(m => {
        const s = document.createElement("span");
        s.className = "tag " + m.cls;
        s.textContent = m.label;
        tr.appendChild(s);
      });
      if (ep.note) {
        const s = document.createElement("span");
        s.className = "tag blocker";
        s.textContent = ep.note;
        tr.appendChild(s);
      }
      body.appendChild(tr);
    }

    if (ep.groups) {
      ep.groups.forEach(g => {
        const sh = document.createElement("div");
        sh.className = "subhead";
        sh.textContent = g.label;
        body.appendChild(sh);
        g.tasks.forEach(t => body.appendChild(taskEl(TASKS.find(x => x.id === t.__id))));
      });
    } else {
      ep.tasks.forEach(t => body.appendChild(taskEl(TASKS.find(x => x.id === t.__id))));
    }

    epic.appendChild(body);
    frag.appendChild(epic);
  });
  list.innerHTML = "";
  list.appendChild(frag);
  updateAll();
  applyVisibility();
}

function toggle(id, val, rowEl) {
  if (val) checks[id] = true; else delete checks[id];
  save(CHECK_KEY, checks);
  rowEl.classList.toggle("done", val);
  updateAll();
  if (ui.hideDone) applyVisibility();
}

function updateAll() {
  const total = TASKS.length;
  const done = TASKS.filter(t => checks[t.id]).length;
  const blockers = TASKS.filter(t => t.blocker);
  const blockLeft = blockers.filter(t => !checks[t.id]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById("pct").textContent = pct;
  document.getElementById("ovbar").style.width = pct + "%";
  document.getElementById("doneN").textContent = done;
  document.getElementById("totalN").textContent = total;
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-left").textContent = total - done;
  document.getElementById("s-block").textContent = blockLeft;
  document.getElementById("tb-left").textContent = (total - done);
  const bw = document.getElementById("s-block-wrap");
  bw.classList.toggle("clear", blockLeft === 0);

  // per-epic rings
  document.querySelectorAll(".epic").forEach(epic => {
    const n = +epic.dataset.n;
    const et = TASKS.filter(t => t.epicN === n);
    const ed = et.filter(t => checks[t.id]).length;
    const ep = et.length ? Math.round((ed / et.length) * 100) : 0;
    epic.querySelector(".mini").textContent = ed + "/" + et.length;
    const ring = epic.querySelector(".ring");
    ring.style.setProperty("--p", ep);
    ring.classList.toggle("done", ep === 100);
  });
}

function applyVisibility() {
  const f = ui.filter;
  document.querySelectorAll(".epic").forEach(epic => {
    let visibleInEpic = 0;
    epic.querySelectorAll(".task").forEach(row => {
      const isDone = row.classList.contains("done");
      const isBlocker = row.dataset.blocker === "1";
      const isNext = row.dataset.next === "1";
      let show = true;
      if (f === "blocker" && !isBlocker) show = false;
      if (f === "next" && !isNext) show = false;
      if (ui.hideDone && isDone) show = false;
      row.classList.toggle("hidden", !show);
      if (show) visibleInEpic++;
    });
    // subheads: hide if all following tasks in that group are hidden
    epic.querySelectorAll(".subhead").forEach(sh => {
      let anyVisible = false;
      let el = sh.nextElementSibling;
      while (el && el.classList.contains("task")) {
        if (!el.classList.contains("hidden")) anyVisible = true;
        el = el.nextElementSibling;
      }
      sh.classList.toggle("hidden", !anyVisible);
    });
    epic.classList.toggle("hidden", visibleInEpic === 0);
  });
}

// ---- Toolbar wiring ----
document.querySelectorAll(".pill[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    ui.filter = btn.dataset.filter;
    document.querySelectorAll(".pill[data-filter]").forEach(b =>
      b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
    save(UI_KEY, ui);
    applyVisibility();
  });
});
const hideDoneBtn = document.getElementById("hideDone");
hideDoneBtn.addEventListener("click", () => {
  ui.hideDone = !ui.hideDone;
  hideDoneBtn.setAttribute("aria-pressed", ui.hideDone ? "true" : "false");
  save(UI_KEY, ui);
  applyVisibility();
});
document.getElementById("reset").addEventListener("click", () => {
  if (!confirm("Clear all checkmarks? This can't be undone.")) return;
  checks = {};
  save(CHECK_KEY, checks);
  render();
});

// restore toolbar state on load
document.querySelectorAll(".pill[data-filter]").forEach(b =>
  b.setAttribute("aria-pressed", b.dataset.filter === ui.filter ? "true" : "false"));
hideDoneBtn.setAttribute("aria-pressed", ui.hideDone ? "true" : "false");

render();
</script>
